name: Atualizar cotações

on:
  schedule:
    # A cada 60 minutos. O GitHub pode atrasar em horários de pico, mas nunca
    # roda mais rápido que isso.
    - cron: "0 * * * *"
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions
  push:
    branches: [main]
    paths:
      - "carteira/scripts/atualizar-cotacoes.mjs"
      - ".github/workflows/atualizar-cotacoes.yml"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Buscar cotações e gerar carteira/dados/cotacoes.json
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: node carteira/scripts/atualizar-cotacoes.mjs

      - name: Publicar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add carteira/dados/cotacoes.json
          git diff --staged --quiet && echo "Sem mudanças." || git commit -m "chore: atualizar cotações [skip ci]"
          git push
